# ============================================
# _y Holdings — Company Configuration
# ============================================
# Edit this file to create YOUR AI company.
# All agents, departments, and hierarchy defined here.
# No code changes needed — just edit and restart.
# ============================================

company:
  name: "_y Holdings"
  mission: "Prove that one human + AI agents can operate at enterprise scale"
  chairman: "R.Andrew"
  language: ko  # ko | en
  theme: dark   # dark | light

# ============================================
# LLM Models Available
# ============================================
# Define your LLM pool. Agents reference these by key.
# Ollama models run locally (free), cloud models need API keys.
llms:
  claude_opus:
    type: anthropic
    model: claude-opus-4-20250514
    label: Claude Opus 4
  claude_sonnet:
    type: anthropic
    model: claude-sonnet-4-20250514
    label: Claude Sonnet 4
  deepseek_r1:
    type: ollama
    model: deepseek-r1:70b
    label: DeepSeek R1 70B
  minimax_m25:
    type: ollama
    model: minimax-m2.5:cloud
    label: MiniMax M2.5
  qwen3_32b:
    type: ollama
    model: qwen3:32b
    label: Qwen3 32B
  gemini_flash:
    type: gemini
    model: gemini-2.5-flash
    label: Gemini Flash
  gemini_pro:
    type: gemini
    model: gemini-2.5-pro
    label: Gemini Pro

# ============================================
# Subsidiaries (Plug & Play)
# ============================================
# 0 subsidiaries → tower IS your company
# 1 subsidiary   → still single company mode (no tabs)
# 2+ subsidiaries → auto Holdings mode (tabs appear)
#
# Each subsidiary gets its own dashboard tab.
# Agents assigned to a subsidiary are "dispatched" from HQ.
# Remaining agents stay in Holdings (auto-computed).
subsidiaries:
  - id: capital
    name: "_y Capital"
    name_ko: "_y 캐피탈"
    icon: "📈"
    color: emerald
    description: "S&P500 algorithmic trading"
    description_ko: "S&P500 알고리즘 트레이딩"
    departments: [capital]        # which departments belong to this subsidiary
    agents: [quanty, tradey, globy, fieldy, hedgy, valuey]
    floors: [2]
    data_sources:
      - type: supabase
        table: trades
        endpoint: /api/trades
    dashboard: CapitalDashboard

  - id: saas
    name: "_y SaaS"
    name_ko: "_y SaaS"
    icon: "🏗️"
    color: cyan
    description: "MyBidWise — government bid platform"
    description_ko: "MyBidWise — 정부입찰공고 플랫폼"
    departments: [saas]
    agents: [watchy, opsy]
    floors: [1]
    data_sources:
      - type: external_supabase
        url: "https://ksdbrovnwphwqonexsus.supabase.co"
        endpoint: /api/monitoring/mybidwise
    dashboard: SaaSDashboard

# ============================================
# Protocols (Future: MCP / A2A compatibility)
# ============================================
# protocols:
