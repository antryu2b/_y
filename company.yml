# ============================================
# Decision Pipeline
# ============================================
pipelines:
  types:
    - market_response
    - product_development
    - investment
    - content_publish
    - hiring
    - ops_incident
    - risk_alert
    - strategy

  delegation_levels:
    1: { name: auto-execute, needs_meeting: false }
    2: { name: execute-then-report, needs_meeting: false }
    3: { name: approve-then-execute, needs_meeting: true }
    4: { name: chairman-directive, needs_meeting: true }
