# ============================================================
# _y Company Configuration
# 이 파일을 수정해서 자신의 회사에 맞게 설정하세요.
# Edit this file to configure your own AI company.
# ============================================================

company:
  name: "_y Holdings"
  nameShort: "_y"
  mission: "Prove that 1 human + AI agents can operate at enterprise scale"
  missionKo: "1명의 인간 + AI 에이전트로 기업 규모 운영이 가능함을 증명"
  stage: "pre-launch"  # pre-launch | growth | scale | mature
  teamSize: "1 human + 30 AI agents"
  founded: "2026"

# ── 계열사 / Subsidiaries ──
subsidiaries:
  - name: "_y Builder"
    description: "AI agent org-chart operating framework"
    descriptionKo: "AI 에이전트 조직도 운영 프레임워크"
  - name: "_y Media"
    description: "Content production & distribution"
    descriptionKo: "콘텐츠 제작/배포"
  - name: "_y Capital"
    description: "Quantitative trading & investment"
    descriptionKo: "퀀트 트레이딩/투자"
  - name: "_y SaaS"
    description: "Operations & service products"
    descriptionKo: "운영/서비스 제품"

# ── 제품 / Products ──
products:
  - name: "_y Builder"
    priority: "critical"     # critical | high | medium | low | hold
    status: "개발 중"
    revenue: "$0"
    description: "AI agent org-chart framework. Ollama-first, open source frame + paid ops/personas/Playbook"
    descriptionKo: "AI 에이전트 조직 프레임워크. Ollama 기반, 오픈소스 프레임 + 유료 노하우/페르소나/Playbook"
    competitors: ["CrewAI", "AutoGen", "LangGraph"]
    differentiator: "Developer tools (code-based) vs _y Builder (business leader tools, org-chart UX)"
    differentiatorKo: "개발자 도구(코드) vs _y Builder(비개발자 리더용, 조직도 UX)"
  - name: "MyBidWise"
    priority: "medium"
    status: "운영 중"
    revenue: "$0 (무료)"
    description: "Government bid aggregation platform. 45 users. Dogfooding for _y Builder"
    descriptionKo: "정부입찰 통합 플랫폼. 45명 유저. _y Builder 독푸딩용"
  - name: "S&P500 Quant"
    priority: "medium"
    status: "실전 운용 중"
    revenue: "운용 중"
    description: "CME futures automated trading via Kiwoom Securities"
    descriptionKo: "키움증권 CME 선물 자동매매"
  - name: "Mindful"
    priority: "hold"
    status: "프로토타입"
    description: "Meditation app"
  - name: "CutFlow"
    priority: "hold"
    status: "프로토타입"
    description: "AI video editing"

# ── 현재 목표 / Current Targets ──
targets:
  shortTerm:
    - "X(Twitter) 바이럴 — 1만+ impression (2주 내)"
    - "GitHub 공개 — 500 star 목표"
  midTerm:
    - "Anthropic/OpenAI 스카우트 접점 확보"
    - "_y Builder 유료 고객 확보"
  killerDemo: "AI 에이전트 회사가 AI 에이전트 뉴스를 분석하는 자기참조 바이럴"
  killerDemoEn: "AI agent company analyzing AI agent news — self-referential viral content"

# ── 고객 / Customers ──
customers:
  primary: "AI에 관심 있는 비개발자 창업자/리더"
  primaryEn: "Non-developer founders/leaders interested in AI"
  secondary: "대기업 혁신팀"
  secondaryEn: "Enterprise innovation teams"

# ── 회장 / Chairman ──
chairman:
  name: "R.Andrew"
  style: "빠른 판단, 데이터 기반, Ship > Plan"
  timezone: "Asia/Seoul"

# ── 핵심 가치 / Core Values ──
values:
  - "Ship > Plan"
  - "Content = Proof"
  - "Global First"
  - "Free First"
  - "Trust the Process"
  - "No Consensus Just Counsel"

# ── 의사결정 원칙 / Decision Principles ──
decisionPrinciples:
  - "각 에이전트는 독립적으로 분석 (Byzantine Generals)"
  - "투표/다수결 금지"
  - "Skepty 리스크 리뷰 필수"
  - "Counsely 종합 → 회장 결재"
  - "구조적 검증: 같은 데이터, 다른 LLM, 독립 결론"

# ── 답변 규칙 / Response Rules ──
responseRules:
  maxSentences: 5
  format: "bullet"
  banned:
    - "~해야 합니다"
    - "모니터링 필요"
    - "검토 필요"
    - "고려해야"
    - "~할 수 있습니다"
  required:
    - "구체적 행동"
    - "숫자/수치"
    - "기한/데드라인"
    - "담당자"
  tone: "스타트업 실무자 (대기업 컨설턴트 톤 금지)"
  toneEn: "Startup operator (no corporate consultant tone)"
